/* ============================================================
   THE RECIPE BOX — a fully local recipe manager + shopping list.
   No backend, no API calls, no accounts. Everything lives in
   IndexedDB on this device. Use Export/Import (Settings tab) to
   move your library between devices or share with someone else.

   To add a new recipe: photograph or paste it into a Claude chat
   and ask for it in the JSON schema shown in the Add tab, then
   paste the result here.
   ============================================================ */

const DB_NAME = "recipe-box";
const DB_VERSION = 1;
const STORE = "recipes";
let db;
let selectedForList = new Set(); // recipe ids chosen for the shopping list
let shopChecked = {}; // persisted checked state for shopping list items
let currentTab = "recipes";
let currentSearch = "";
let currentTagFilter = "";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains(STORE)) {
        database.createObjectStore(STORE, { keyPath: "id" });
      }
      if (!database.objectStoreNames.contains("meta")) {
        database.createObjectStore("meta", { keyPath: "key" });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

function tx(storeName, mode) {
  return db.transaction(storeName, mode).objectStore(storeName);
}

function getAllRecipes() {
  return new Promise((resolve, reject) => {
    const req = tx(STORE, "readonly").getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function putRecipe(recipe) {
  return new Promise((resolve, reject) => {
    const req = tx(STORE, "readwrite").put(recipe);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function deleteRecipe(id) {
  return new Promise((resolve, reject) => {
    const req = tx(STORE, "readwrite").delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function getMeta(key) {
  return new Promise((resolve) => {
    const req = tx("meta", "readonly").get(key);
    req.onsuccess = () => resolve(req.result ? req.result.value : null);
    req.onerror = () => resolve(null);
  });
}

function setMeta(key, value) {
  return new Promise((resolve, reject) => {
    const req = tx("meta", "readwrite").put({ key, value });
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function slugify(str) {
  return str.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
}

/* ---------- Rendering ---------- */

async function seedIfEmpty() {
  const existing = await getAllRecipes();
  if (existing.length === 0) {
    for (const r of SEED_RECIPES) await putRecipe(r);
  }
}

function allTags(recipes) {
  const s = new Set();
  recipes.forEach(r => (r.tags || []).forEach(t => s.add(t)));
  return Array.from(s).sort();
}

async function renderRecipes() {
  const main = document.getElementById("main");
  const recipes = await getAllRecipes();
  recipes.sort((a, b) => a.title.localeCompare(b.title));

  const filtered = recipes.filter(r => {
    const matchesSearch = !currentSearch || r.title.toLowerCase().includes(currentSearch.toLowerCase()) ||
      (r.ingredients || []).some(i => i.toLowerCase().includes(currentSearch.toLowerCase()));
    const matchesTag = !currentTagFilter || (r.tags || []).includes(currentTagFilter);
    return matchesSearch && matchesTag;
  });

  const tags = allTags(recipes);

  let html = `<div class="toolbar">
    <input type="text" id="searchInput" placeholder="Search recipes or ingredients..." value="${escapeAttr(currentSearch)}">
    <select id="tagSelect">
      <option value="">All tags</option>
      ${tags.map(t => `<option value="${escapeAttr(t)}" ${t === currentTagFilter ? "selected" : ""}>${escapeHtml(t)}</option>`).join("")}
    </select>
  </div>`;

  if (selectedForList.size > 0) {
    html += `<div class="status-msg status-ok">${selectedForList.size} recipe(s) selected for shopping list. Go to the Shopping List tab to build it.</div>`;
  }

  if (filtered.length === 0) {
    html += `<div class="empty-msg">No recipes match yet. Add one from the Add tab, or clear your search.</div>`;
  } else {
    filtered.forEach(r => {
      const isSelected = selectedForList.has(r.id);
      html += `<div class="recipe-card" data-id="${escapeAttr(r.id)}">
        <h3>${escapeHtml(r.title)}</h3>
        <div class="recipe-meta">${escapeHtml(r.servesLabel || "")} ${r.servesLabel && r.time ? "&middot;" : ""} ${escapeHtml(r.time || "")}</div>
        <div class="tag-row">${(r.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>
        <div class="card-actions">
          <button class="mini-btn ${isSelected ? "selected" : ""}" data-action="select" data-id="${escapeAttr(r.id)}">${isSelected ? "✓ In list" : "+ Add to list"}</button>
          <button class="mini-btn danger" data-action="delete" data-id="${escapeAttr(r.id)}">Delete</button>
        </div>
      </div>`;
    });
  }

  main.innerHTML = html;

  document.getElementById("searchInput").addEventListener("input", (e) => {
    currentSearch = e.target.value;
    renderRecipes();
  });
  document.getElementById("tagSelect").addEventListener("change", (e) => {
    currentTagFilter = e.target.value;
    renderRecipes();
  });

  main.querySelectorAll(".recipe-card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (e.target.closest("button")) return;
      renderDetail(card.dataset.id);
    });
  });
  main.querySelectorAll('[data-action="select"]').forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (selectedForList.has(id)) selectedForList.delete(id);
      else selectedForList.add(id);
      renderRecipes();
    });
  });
  main.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      if (!confirm("Delete this recipe? This can't be undone (unless you have an exported backup).")) return;
      await deleteRecipe(btn.dataset.id);
      selectedForList.delete(btn.dataset.id);
      renderRecipes();
    });
  });
}

async function renderDetail(id) {
  const main = document.getElementById("main");
  const recipes = await getAllRecipes();
  const r = recipes.find(x => x.id === id);
  if (!r) { renderRecipes(); return; }

  main.innerHTML = `
    <button class="back-btn" id="backBtn">&larr; Back to recipes</button>
    <div class="detail-card">
      <h2>${escapeHtml(r.title)}</h2>
      <div class="recipe-meta">${escapeHtml(r.servesLabel || "")} ${r.servesLabel && r.time ? "&middot;" : ""} ${escapeHtml(r.time || "")} ${r.source ? "&middot; " + escapeHtml(r.source) : ""}</div>
      <div class="tag-row">${(r.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>

      <div class="section-label">Ingredients</div>
      <ul class="ing-list">${(r.ingredients || []).map(i => `<li>${escapeHtml(i)}</li>`).join("")}</ul>

      <div class="section-label">Method</div>
      <ol class="method-list">${(r.method || []).map(m => `<li>${escapeHtml(m)}</li>`).join("")}</ol>

      ${r.notes ? `<div class="section-label">Notes</div><div class="notes-box">${escapeHtml(r.notes)}</div>` : ""}
    </div>
  `;
  document.getElementById("backBtn").addEventListener("click", renderRecipes);
}

/* ---------- Shopping list ---------- */

async function renderShoppingList() {
  const main = document.getElementById("main");
  const recipes = await getAllRecipes();
  const chosen = recipes.filter(r => selectedForList.has(r.id));

  if (chosen.length === 0) {
    main.innerHTML = `<div class="empty-msg">No recipes selected yet. Head to the Recipes tab and tap "+ Add to list" on the ones you're cooking this week.</div>`;
    return;
  }

  const savedChecked = await getMeta("shopChecked");
  shopChecked = savedChecked || {};

  // Build a flat, tagged ingredient list, grouped by recipe for now
  // (kept simple and literal here -- no auto-merge of quantities,
  // since that needs judgement a plain script can't safely do).
  let html = `<div class="status-msg status-ok">Shopping list for: ${chosen.map(r => escapeHtml(r.title)).join(", ")}</div>`;
  html += `<div class="btn-row" style="margin:12px 0;"><button class="secondary-btn" id="clearSelectionBtn">Clear selection</button><button class="secondary-btn" id="uncheckAllBtn">Uncheck all</button></div>`;

  chosen.forEach(r => {
    html += `<div class="section-label">${escapeHtml(r.title)}</div><div>`;
    (r.ingredients || []).forEach((ing, idx) => {
      const key = r.id + "::" + idx;
      const isChecked = !!shopChecked[key];
      html += `<div class="shop-item ${isChecked ? "checked" : ""}" data-key="${escapeAttr(key)}">
        <div class="box"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
        <div class="item-text">${escapeHtml(ing)}</div>
      </div>`;
    });
    html += `</div>`;
  });

  main.innerHTML = html;

  main.querySelectorAll(".shop-item").forEach(el => {
    el.addEventListener("click", async () => {
      const key = el.dataset.key;
      shopChecked[key] = !shopChecked[key];
      await setMeta("shopChecked", shopChecked);
      el.classList.toggle("checked");
    });
  });
  document.getElementById("clearSelectionBtn").addEventListener("click", () => {
    selectedForList.clear();
    renderShoppingList();
  });
  document.getElementById("uncheckAllBtn").addEventListener("click", async () => {
    shopChecked = {};
    await setMeta("shopChecked", shopChecked);
    renderShoppingList();
  });
}

/* ---------- Add recipe (paste JSON) ---------- */

const SCHEMA_EXAMPLE = {
  id: "short-unique-slug",
  title: "Recipe Title",
  source: "e.g. cookbook name, page, or website",
  tags: ["chicken", "quick", "weeknight"],
  servesLabel: "Serves 2 (or 'Makes 6 portions')",
  time: "20 min",
  ingredients: ["200g chicken breast", "1 lemon"],
  method: ["Step one.", "Step two."],
  notes: "Optional tips or variations.",
  dateAdded: "2026-07-11"
};

function renderAdd(statusMsg) {
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="settings-card">
      <h3>Add a recipe</h3>
      <p>Paste a single recipe object, or an array of several, in the schema below. The easiest way to get this: send a photo or text of the recipe to Claude in a normal chat and ask it to return the recipe in this exact JSON schema.</p>
      <textarea id="jsonInput" placeholder="Paste recipe JSON here..."></textarea>
      <button class="primary-btn" id="importJsonBtn">Add to Rustle Up</button>
      ${statusMsg ? statusMsg : ""}
    </div>
    <div class="schema-box">
      <strong>Schema to send Claude / paste here:</strong>
      <pre>${escapeHtml(JSON.stringify(SCHEMA_EXAMPLE, null, 2))}</pre>
      <div>Only <code>title</code> and <code>ingredients</code> are required — everything else is optional. If <code>id</code> is missing, one is generated from the title.</div>
    </div>
  `;
  document.getElementById("importJsonBtn").addEventListener("click", handleJsonImport);
}

async function handleJsonImport() {
  const raw = document.getElementById("jsonInput").value.trim();
  if (!raw) return;
  let parsed;
  try {
    parsed = JSON.parse(raw);
  } catch (e) {
    renderAdd(`<div class="status-msg status-err">Couldn't parse that as JSON: ${escapeHtml(e.message)}</div>`);
    return;
  }
  const items = Array.isArray(parsed) ? parsed : [parsed];
  let added = 0;
  let skipped = 0;
  for (const item of items) {
    if (!item.title || !item.ingredients) { skipped++; continue; }
    const recipe = {
      id: item.id ? slugify(item.id) : slugify(item.title) + "-" + Date.now().toString(36).slice(-4),
      title: item.title,
      source: item.source || "",
      tags: item.tags || [],
      servesLabel: item.servesLabel || (item.serves ? `Serves ${item.serves}` : ""),
      time: item.time || "",
      ingredients: item.ingredients || [],
      method: item.method || [],
      notes: item.notes || "",
      dateAdded: item.dateAdded || new Date().toISOString().slice(0, 10)
    };
    await putRecipe(recipe);
    added++;
  }
  renderAdd(`<div class="status-msg status-ok">Added ${added} recipe(s)${skipped ? `, skipped ${skipped} (missing title or ingredients)` : ""}.</div>`);
}

/* ---------- Settings: export / import full library ---------- */

function renderSettings() {
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="settings-card">
      <h3>Export your library</h3>
      <p>Download everything in your Rustle Up library as a single JSON file — useful for backups, or to share your library with your partner.</p>
      <div class="btn-row"><button class="secondary-btn" id="exportBtn">Export as JSON</button></div>
    </div>
    <div class="settings-card">
      <h3>Import a library</h3>
      <p>Import a previously exported JSON file. Recipes are matched by id — importing will update recipes that already exist and add any new ones, without duplicating.</p>
      <div class="btn-row">
        <button class="secondary-btn" id="importBtn">Choose file to import</button>
        <input type="file" id="fileInput" accept="application/json">
      </div>
      <div id="importStatus"></div>
    </div>
    <div class="settings-card">
      <h3>About this app</h3>
      <p>Everything here lives in this browser's IndexedDB — nothing is sent anywhere, and there's no account or server involved. Clearing your browser data will clear your recipes too, so export regularly if you want a backup.</p>
    </div>
  `;
  document.getElementById("exportBtn").addEventListener("click", exportLibrary);
  document.getElementById("importBtn").addEventListener("click", () => document.getElementById("fileInput").click());
  document.getElementById("fileInput").addEventListener("change", handleFileImport);
}

async function exportLibrary() {
  const recipes = await getAllRecipes();
  const blob = new Blob([JSON.stringify(recipes, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `rustle-up-export-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleFileImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      const items = Array.isArray(parsed) ? parsed : [parsed];
      let count = 0;
      for (const item of items) {
        if (!item.title || !item.ingredients) continue;
        const recipe = {
          id: item.id || slugify(item.title) + "-" + Date.now().toString(36).slice(-4),
          title: item.title,
          source: item.source || "",
          tags: item.tags || [],
          servesLabel: item.servesLabel || "",
          time: item.time || "",
          ingredients: item.ingredients || [],
          method: item.method || [],
          notes: item.notes || "",
          dateAdded: item.dateAdded || new Date().toISOString().slice(0, 10)
        };
        await putRecipe(recipe);
        count++;
      }
      document.getElementById("importStatus").innerHTML = `<div class="status-msg status-ok">Imported ${count} recipe(s).</div>`;
    } catch (err) {
      document.getElementById("importStatus").innerHTML = `<div class="status-msg status-err">Import failed: ${escapeHtml(err.message)}</div>`;
    }
  };
  reader.readAsText(file);
}

/* ---------- Utilities ---------- */

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function escapeAttr(str) { return escapeHtml(str); }

/* ---------- Tabs ---------- */

function setTab(tab) {
  currentTab = tab;
  document.getElementById("tabRecipesBtn").classList.toggle("active", tab === "recipes");
  document.getElementById("tabShopBtn").classList.toggle("active", tab === "shop");
  document.getElementById("tabAddBtn").classList.toggle("active", tab === "add");
  document.getElementById("tabSettingsBtn").classList.toggle("active", tab === "settings");
  if (tab === "recipes") renderRecipes();
  else if (tab === "shop") renderShoppingList();
  else if (tab === "add") renderAdd();
  else if (tab === "settings") renderSettings();
}

document.getElementById("tabRecipesBtn").addEventListener("click", () => setTab("recipes"));
document.getElementById("tabShopBtn").addEventListener("click", () => setTab("shop"));
document.getElementById("tabAddBtn").addEventListener("click", () => setTab("add"));
document.getElementById("tabSettingsBtn").addEventListener("click", () => setTab("settings"));

(async () => {
  db = await openDB();
  await seedIfEmpty();
  setTab("recipes");
})();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((err) => {
      console.error("Service worker registration failed:", err);
    });
  });
}
